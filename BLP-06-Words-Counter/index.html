<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words Counter</title>
</head>
<body>
    <div class="main-div">
        <div class="heading">Words Counter</div>
        <div class="textarea"><textarea oninput="wordCounter()" id="inputText" cols="100%" rows="15" placeholder="Enter Your Text ..."></textarea></div>
        <div class="outputs">
            <div class="words">
                <label>Total Words</label>
                <input type="button" id="words" value="0">
            </div>
            <div class="chars">
                <label>Total Characters</label>
                <input type="button" id="characters" value="0">
            </div>
            <div class="alphabets">
                <label>Total Alphabets</label>
                <input type="button" id="alphabets" value="0">
            </div>
            <div class="numbers">
                <label>Total Numbers</label>
                <input type="button" id="numbers" value="0">
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
