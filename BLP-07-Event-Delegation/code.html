<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Event Delegation</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
            }
            main {
                width: 100vw;
                height: 100vh;
                background-color: #000;
                display: grid;
                place-items: center;
            }
            div {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background-color: #000;
                border: 1px solid goldenrod;
                gap: 30px;
                padding: 20px 100px;
                border-radius: 10px;
            }
            h1 {
                background: linear-gradient(90deg, goldenrod, pink);
                background-clip: text;
                color: transparent;
                font-size: 50px;
            }
            ul {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            li {
                color: purple;
                list-style-type: none;
                font-size: 30px;
                padding: 10px 15px;
                border: 1px solid goldenrod;
                text-align: center;
                letter-spacing: 2px;
                border-radius: 5px;
                font-weight: bold;
            }
            li:hover {
                cursor: pointer;
                color: goldenrod;
                background-color: purple;
                transition: .3s ease-in-out;
            }
            p{
                background: linear-gradient(90deg, red, white);
                background-clip: text;
                color: transparent;
                font-size: 30px;
            }
        </style>
    </head>
    <body>
        <main>
            <div>
                <h1>Which Language you like the most?</h1>
                <ul>
                    <li>Html</li>
                    <li>CSS</li>
                    <li>Javascript</li>
                    <li>React</li>
                </ul>
                <p></p>
            </div>
        </main>
        <script>
            const ul = document.querySelector("ul");
            const p = document.querySelector("p");
            ul.addEventListener("click", (e) => {
                p.innerHTML = `You like ${e.target.innerText} the most`;
            });
        </script>
    </body>
</html>
